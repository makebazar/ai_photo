<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="color-scheme" content="dark" />
    <meta name="telegram-web-app-enabled" content="true" />
    <title>AI Photo — Prototype</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Telegram WebApp initialization: expand viewport and set header color
      (function() {
        if (window.Telegram && window.Telegram.WebApp) {
          const tg = window.Telegram.WebApp;
          tg.ready();
          tg.expand();
          tg.setHeaderColor('#0a0a0a');
          tg.setBackgroundColor('#0a0a0a');
          // Enable vertical swipe gestures
          tg.enableVerticalSwipes();
        }
      })();
    </script>
  </head>
  <body class="bg-void text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
